<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authorize List Rename</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #172B4D;
      background: #FFFFFF;
    }
    #container { display: grid; gap: 12px; }
    h1 { margin: 0; font-size: 16px; line-height: 1.3; }
    p { margin: 0; color: #5E6C84; font-size: 13px; line-height: 1.5; }
    button {
      height: 36px;
      border: 0;
      border-radius: 6px;
      background: #0052CC;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0065FF; }
    #statusMsg {
      display: none;
      font-size: 13px;
      color: #5E6C84;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>Authorize List Rename</h1>
    <p>This Power-Up needs Trello write access to rename lists with their card count.</p>
    <button id="authorizeBtn">Authorize</button>
    <div id="statusMsg"></div>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var TRELLO_API_KEY = '1bde546d7e6e1918bea4131b50dd462d';
    var APP_NAME = 'Set-List-Limit';
    var t = window.TrelloPowerUp.iframe({
      appKey: TRELLO_API_KEY,
      appName: APP_NAME
    });

    t.render(function () {
      t.sizeTo('#container').catch(function () {});
    });

    // Pre-resolve the REST API client before the user clicks anything.
    // Once resolved, we call .authorize() DIRECTLY inside the click handler —
    // no .then() chains before it — so the browser's user-gesture context is preserved.
    var resolvedClient = null;
    Promise.resolve(t.getRestApi()).then(function (client) {
      resolvedClient = client;
    });

    var statusEl = document.getElementById('statusMsg');
    var authBtn = document.getElementById('authorizeBtn');

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      t.sizeTo('#container').catch(function () {});
    }

    authBtn.addEventListener('click', function () {
  if (!resolvedClient) {
    showStatus('Not ready yet, please try again in a moment.');
    return;
  }

  authBtn.disabled = true;
  authBtn.textContent = 'Authorizing...';

  showStatus('A Trello window will open. Please approve access there.');

  resolvedClient.authorize({
    scope: 'read,write',
    expiration: 'never'
  })
  .then(function () {
    showStatus('✅ Authorized successfully! You can now save limits.');
    authBtn.textContent = 'Authorized ✓';

    setTimeout(function () {
      t.closePopup();
    }, 1200);
  })
  .catch(function (err) {
    console.error('Authorization failed:', err);

    authBtn.disabled = false;
    authBtn.textContent = 'Authorize';

    showStatus('Authorization failed or was cancelled. Please try again.');
  });
}
  
  
  );
  </script>
</body>
</html>
