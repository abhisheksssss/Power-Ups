<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authorize List Rename</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #172B4D;
      background: #FFFFFF;
    }
    #container { display: grid; gap: 12px; }
    h1 { margin: 0; font-size: 16px; line-height: 1.3; }
    p { margin: 0; color: #5E6C84; font-size: 13px; line-height: 1.5; }
    button {
      height: 36px;
      border: 0;
      border-radius: 6px;
      background: #0052CC;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0065FF; }
  </style>
</head>
<body>
  <div id="container">
    <h1>Authorize List Rename</h1>
    <p>This Power-Up needs Trello write access to rename lists with their card count.</p>
    <button id="authorizeBtn">Authorize</button>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var TRELLO_API_KEY = '1bde546d7e6e1918bea4131b50dd462d';
    var APP_NAME = 'List Limit Power-Up';
    var BASE_URL = 'https://power-ups-dvon.vercel.app';
    var t = window.TrelloPowerUp.iframe({
      appKey: TRELLO_API_KEY,
      appName: APP_NAME
    });

    t.render(function () {
      t.sizeTo('#container').catch(function () {});
    });

    // Pre-resolve the REST client so we can call storeToken() after auth
    var resolvedClient = null;
    Promise.resolve(t.getRestApi()).then(function (client) {
      resolvedClient = client;
    });

    document.getElementById('authorizeBtn').addEventListener('click', function () {
      // Build the Trello OAuth URL manually.
      // We use window.open() DIRECTLY here (not through the SDK) so the browser
      // treats it as a synchronous user-initiated popup and doesn't block it.
      var returnUrl = BASE_URL + '/auth-success.html';
      var authUrl = 'https://trello.com/1/authorize' +
        '?expiration=never' +
        '&name=' + encodeURIComponent(APP_NAME) +
        '&scope=read%2Cwrite' +
        '&response_type=token' +
        '&key=' + TRELLO_API_KEY +
        '&callback_method=postMessage' +
        '&return_url=' + encodeURIComponent(returnUrl);

      var authWindow = window.open(authUrl, 'trello-auth', 'width=600,height=700,left=200,top=100');

      if (!authWindow) {
        // Popup was blocked by the browser
        console.error('Popup was blocked. Allow popups for this site.');
        t.alert({ message: 'Please allow popups for this site and try again.', duration: 6 });
        return;
      }

      // Listen for the token sent back from auth-success.html
      function handleAuthMessage(event) {
        if (!event.data || event.data.type !== 'trello-oauth' || !event.data.token) return;

        window.removeEventListener('message', handleAuthMessage);
        var token = event.data.token;
        console.log('Token received, storing...');

        // Store token via SDK client if available, otherwise use localStorage directly
        var storePromise;
        if (resolvedClient && typeof resolvedClient.storeToken === 'function') {
          storePromise = Promise.resolve(resolvedClient.storeToken(token));
        } else {
          localStorage.setItem('trello_token', token);
          storePromise = Promise.resolve();
        }

        storePromise.then(function () {
          console.log('Token stored successfully.');
          t.closePopup();
        }).catch(function (err) {
          console.error('Error storing token:', err);
          t.alert({ message: 'Authorization succeeded but token could not be saved.', duration: 5 });
        });
      }

      window.addEventListener('message', handleAuthMessage);
    });
  </script>
</body>
</html>
