<!DOCTYPE html>
<html>

<head>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>

<body>

<script>

const token = new URLSearchParams(
    window.location.hash.substring(1)
).get("token");

if (window.opener) {

    window.opener.postMessage({

        type: "trello-oauth",

        token: token

    }, "*");

}

window.close();

</script>

</body>

</html>
