<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authorization Successful</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #172B4D;
      background: #FFFFFF;
      text-align: center;
    }
    p { color: #5E6C84; font-size: 13px; }
  </style>
</head>
<body>
  <p id="msg">Completing authorization…</p>

  <script>
    let authorize;

    try {
      if (window.opener && typeof window.opener.authorize === "function") {
        authorize = window.opener.authorize;
      }
    } catch (e) {
      // Security settings are preventing this, fall back to local storage.
    }

    // Trello auth puts the token in the hash if callback_method=fragment.
    let token = "";
    const hash = window.location.hash;
    if (hash) {
      const match = hash.match(/token=([^&]*)/);
      if (match) {
        token = match[1];
      }
    }

    if (token) {
      // Store under 'trello_token' so our REST API client finds it
      localStorage.setItem('trello_token', token);
      
      // Store under 'token' for t.authorize's polling fallback
      localStorage.setItem('token', token);
      
      // Call the authorize function exposed by t.authorize (if available)
      if (authorize) {
        authorize(token);
      }
      
      document.getElementById('msg').textContent = 'Authorization successful! Closing...';
    } else {
      document.getElementById('msg').textContent = 'Authorization failed — no token received. Please try again.';
      console.error('auth-success.html: no token found in URL hash.', window.location.href);
    }

    setTimeout(function () {
      window.close();
    }, 1000);
  </script>
</body>
</html>
