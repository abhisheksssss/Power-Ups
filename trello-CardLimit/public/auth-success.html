<!DOCTYPE html>
<html>
<head>
  <title>Authorization Successful</title>
</head>
<body>
<script>
  var token = new URLSearchParams(
    window.location.hash.substring(1)
  ).get('token');

  if (token && window.opener) {
    // Post to "*" because the opener is our Power-Up iframe, not trello.com
    window.opener.postMessage({ type: 'trello-oauth', token: token }, '*');
  }
  window.close();
</script>
</body>
</html>
