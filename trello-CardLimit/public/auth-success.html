<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Authorization Successful</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #172B4D;
            background: #FFFFFF;
            text-align: center;
        }

        p {
            color: #5E6C84;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <p id="msg">Completing authorization…</p>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        var TRELLO_API_KEY = '1bde546d7e6e1918bea4131b50dd462d';
        var APP_NAME = 'Set-List-Limit';

        // Read the token from the URL hash that Trello appended after authorization.
        // e.g. https://our-domain/auth-success.html#token=abc123
        var params = new URLSearchParams(window.location.hash.substring(1));
        var token = params.get('token');

        if (token) {
            // Store the token in localStorage with the key the SDK expects.
            // The Trello Power-Up SDK reads the token via client.getToken() which
            // looks for 'trello_token' in localStorage.
            localStorage.setItem('trello_token', token);
            console.log('Authorization successful — token stored.');

            // Initialize the Trello iframe connection and close the popup.
            var t = window.TrelloPowerUp.iframe({
                appKey: TRELLO_API_KEY,
                appName: APP_NAME
            });
            t.closePopup();
        } else {
            document.getElementById('msg').textContent = 'Authorization failed — no token received. Please try again.';
            console.error('auth-success.html: no token found in URL hash.', window.location.href);
        }
    </script>
</body>

</html>
