<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Capacity Exceeded</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #172B4D;
      padding: 0;
      height: auto;
      overflow: hidden;
    }

    .title-bar {
      background: #FFEBE6;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid #FFBDAD;
    }

    .title-bar h1 {
      font-size: 14px;
      font-weight: 800;
      color: #BF2600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .body {
      padding: 14px 16px;
    }

    .message {
      font-size: 13px;
      color: #5E6C84;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .message strong {
      color: #172B4D;
    }

    .suggestions-box {
      background: #FFF4F4;
      border: 1.5px solid #FF8F73;
      border-radius: 8px;
      padding: 14px;
    }

    .suggestions-label {
      font-size: 11px;
      font-weight: 800;
      color: #BF2600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 12px;
    }

    .suggestion-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #172B4D;
      line-height: 1.5;
    }

    .suggestion-item:last-child { margin-bottom: 0; }

    .star {
      color: #FF5630;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #DFE1E6;
    }

    .action-btn {
      width: 100%;
      height: 36px;
      background: #BF2600;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .action-btn:hover { background: #DE350B; }
  </style>
</head>
<body>

  <div class="title-bar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#BF2600">
      <path d="M12 2L1 21H23L12 2ZM12 18a1 1 0 110-2 1 1 0 010 2ZM11 10h2v5h-2z"/>
    </svg>
    <h1>List Capacity Exceed!</h1>
  </div>

  <div class="body">
    <p class="message" id="mainMsg">
      This list holds <strong id="countSpan">—</strong> cards, which exceeds
      the limit threshold of <strong id="limitSpan">—</strong> cards!
    </p>

    <div class="suggestions-box">
      <div class="suggestions-label">Actionable Suggestions</div>

      <div class="suggestion-item">
        <span class="star">★</span>
        <span>Click the <strong>Set Card Limit</strong> option in the list menu to increase the limit.</span>
      </div>

      <div class="suggestion-item">
        <span class="star">★</span>
        <span>Move surplus cards in to adjacent columns on the board.</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="action-btn" id="goToSettings">Adjust Limit →</button>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var BASE_URL = 'https://power-ups-dvon.vercel.app';
    var t = window.TrelloPowerUp.iframe();

    t.render(function () {
      t.list('id', 'cards').then(function (list) {
        var cardCount = list.cards ? list.cards.length : 0;
        document.getElementById('countSpan').textContent = cardCount;

        t.get('list', 'shared', 'limit').then(function (limit) {
          document.getElementById('limitSpan').textContent = limit || '—';
          // Resize to fit content after data loads
          t.sizeTo('body').catch(function () {});
        });
      });
    });

    document.getElementById('goToSettings').addEventListener('click', function () {
      t.popup({
        title: 'Set List Limit',
        url: BASE_URL + '/list-settings.html',
        height: 280
      });
    });
  </script>
</body>
</html>
