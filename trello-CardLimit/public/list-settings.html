<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set List Limit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000000;
      color: #FFFFFF;
      margin: 0;
      padding: 0;
      overflow-y: hidden;
    }
    
    #container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .icon-box {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #e3fcef;
    }

    .list-name-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .list-name {
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
    }

    .status-dot {
      font-size: 12px;
    }

    .limit-count {
      font-size: 14px;
      font-weight: 500;
      color: #8C9BAB;
    }

    .status-text {
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    .stats {
      background: #1d2125;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #8C9BAB;
    }

    .stats-count {
      font-weight: 700;
      font-size: 13px;
    }

    .progress-bg {
      height: 6px;
      background: #2C333A;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .control-label {
      font-size: 11px;
      font-weight: 700;
      color: #8C9BAB;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .number-control {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid #38414A;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      width: 100%;
      height: 44px;
    }

    .number-control button {
      width: 44px;
      height: 100%;
      background: #1d2125;
      border: none;
      font-size: 20px;
      font-weight: 400;
      color: #FFFFFF;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .number-control button:hover { background: #2C333A; }

    .number-control input {
      flex: 1;
      text-align: center;
      border: none;
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      background: #000000;
      outline: none;
      height: 100%;
      width: 100%;
      -moz-appearance: textfield;
    }

    /* Hide native number input spinners */
    .number-control input::-webkit-outer-spin-button,
    .number-control input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .hint {
      font-size: 11px;
      color: #8C9BAB;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .save-btn {
      width: 100%;
      height: 40px;
      background: #0052CC;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #0065FF; }
    .save-btn:active { background: #0041A8; }
  </style>
</head>
<body>
  <div id="container">
    <div class="header">
      <div class="icon-box" id="iconBox">
  <svg
    width="18"
    height="18"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M4.93 19A10 10 0 1 1 19.07 19"/>
    <path d="M12 12l4-4"/>
    <circle cx="12" cy="12" r="1"/>
  </svg>
</div>
      <div>
        <div class="list-name-container">
          <span class="list-name" id="listName">Loading…</span>
         <span class="status-dot" id="statusDot" style="display:none; font-size: 30px;">●</span>
          <span class="limit-count" id="limitCountText" style="display:none;"></span>
        </div>
        <div class="status-text" id="statusText" style="color: #22c55e;">Within limit</div>
      </div>
    </div>

  <div class="stats" id="statsBox" style="display:none;">
    <div class="stats-row">
      <span>Cards in list</span>
      <span class="stats-count" id="statsCount">0</span>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill" style="width:0%; background:#22c55e;"></div>
    </div>
  </div>

  <div class="control-label">Maximum cards</div>
  <div class="number-control">
    <button id="decBtn">−</button>
    <input type="number" id="limitInput" value="0" min="0" />
    <button id="incBtn">+</button>
  </div>

  <p class="hint">
    The list header turns amber past the first 70% limit, and red once it's exceeded. Set to 0 to remove the limit.
  </p>

  <button class="save-btn" id="saveBtn">Save</button>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var limitVal = 0;
    var cardCount = 0;
    var listId = null;

    function getColor(pct) {
      if (pct >= 100) return '#ef4444';
      if (pct >= 70)  return '#eab308';
      return '#22c55e';
    }

    function sizeToContent() {
      t.sizeTo('#container').catch(function () {});
    }

    function updateUI() {
      var pct = limitVal > 0 ? Math.min(100, (cardCount / limitVal) * 100) : 0;
      var color = getColor(pct);

      document.getElementById('limitInput').value = limitVal;

      if (limitVal > 0) {
        document.getElementById('statsBox').style.display = 'block';
        document.getElementById('statsCount').textContent = cardCount + ' / ' + limitVal;
        document.getElementById('progressFill').style.width  = pct + '%';
        document.getElementById('progressFill').style.background = color;
        document.getElementById('statusText').style.color = color;
        document.getElementById('iconBox').style.background = color + '22';
        document.getElementById('iconBox').querySelector('svg').setAttribute('stroke', color);
        
        document.getElementById('statusDot').style.display = 'inline-block';
        document.getElementById('statusDot').style.color = color;
        document.getElementById('limitCountText').style.display = 'inline-block';
        document.getElementById('limitCountText').textContent = '(' + cardCount + '/' + limitVal + ')';

        if (pct >= 100) {
          document.getElementById('statusText').textContent = 'Limit exceeded';
        } else if (pct >= 70) {
          document.getElementById('statusText').textContent = 'Nearing limit';
        } else {
          document.getElementById('statusText').textContent = 'Within limit';
        }
      } else {
        document.getElementById('statsBox').style.display = 'none';
        document.getElementById('statusText').textContent  = 'No limit set';
        document.getElementById('statusText').style.color  = '#8C9BAB';
        document.getElementById('statusDot').style.display = 'none';
        document.getElementById('limitCountText').style.display = 'none';
      }

      // Resize iframe to match new content height
      sizeToContent();
    }

    t.render(function () {
      t.list('id', 'name', 'cards').then(function (list) {
        listId    = list.id;
        cardCount = list.cards ? list.cards.length : 0;
        document.getElementById('listName').textContent = list.name;

        return t.get('board', 'shared', 'limit_' + list.id).then(function (saved) {
          limitVal = saved ? parseInt(saved, 10) : 0;
          updateUI();
        });
      });
    });

    document.getElementById('incBtn').addEventListener('click', function () {
      limitVal++;
      updateUI();
    });

    document.getElementById('decBtn').addEventListener('click', function () {
      if (limitVal > 0) limitVal--;
      updateUI();
    });

    document.getElementById('limitInput').addEventListener('change', function () {
      limitVal = Math.max(0, parseInt(this.value, 10) || 0);
      updateUI();
    });

    document.getElementById('saveBtn').addEventListener('click', function () {
      if (limitVal > 0) {
        document.getElementById("saveBtn").addEventListener("click", function () {

    console.log("Saving:", limitVal);

    const action =
        limitVal > 0
            ? t.set("board", "shared", "limit_" + listId, limitVal)
            : t.remove("board", "shared", "limit_" + listId);

    action
        .then(function () {
            console.log("Saved successfully");
            return t.get("board", "shared", "limit_" + listId);
        })
        .then(function (saved) {

            console.log("Read back:", saved);

            t.closePopup();

        })
        .catch(function (err) {

            console.error("Save failed:", err);

            t.alert({
                message: "Failed to save limit",
                duration: 5
            });

        });

});
      } else {
        t.remove('list', 'shared', 'limit').then(function () {
          t.closePopup();
        });
      }
    });
  </script>
  </div>
</body>
</html>
