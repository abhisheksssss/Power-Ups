<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set List Limit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000000;
      color: #FFFFFF;
      margin: 0;
      padding: 0;
      overflow-y: hidden;
    }
    
    #container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .icon-box {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #e3fcef;
    }

    .list-name-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .list-name {
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
    }

    .status-dot {
      font-size: 12px;
    }

    .limit-count {
      font-size: 14px;
      font-weight: 500;
      color: #8C9BAB;
    }

    .status-text {
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    .stats {
      background: #1d2125;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #8C9BAB;
    }

    .stats-count {
      font-weight: 700;
      font-size: 13px;
    }

    .progress-bg {
      height: 6px;
      background: #2C333A;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .control-label {
      font-size: 11px;
      font-weight: 700;
      color: #8C9BAB;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .number-control {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid #38414A;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      width: 100%;
      height: 44px;
    }

    .number-control button {
      width: 44px;
      height: 100%;
      background: #1d2125;
      border: none;
      font-size: 20px;
      font-weight: 400;
      color: #FFFFFF;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .number-control button:hover { background: #2C333A; }

    .number-control input {
      flex: 1;
      text-align: center;
      border: none;
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      background: #000000;
      outline: none;
      height: 100%;
      width: 100%;
      -moz-appearance: textfield;
    }

    /* Hide native number input spinners */
    .number-control input::-webkit-outer-spin-button,
    .number-control input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .hint {
      font-size: 11px;
      color: #8C9BAB;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .save-btn {
      width: 100%;
      height: 40px;
      background: #0052CC;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #0065FF; }
    .save-btn:active { background: #0041A8; }
  </style>
</head>
<body>
  <div id="container">
    <div class="header">
      <div class="icon-box" id="iconBox">
  <svg
    width="18"
    height="18"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M4.93 19A10 10 0 1 1 19.07 19"/>
    <path d="M12 12l4-4"/>
    <circle cx="12" cy="12" r="1"/>
  </svg>
</div>
      <div>
        <div class="list-name-container">
          <span class="list-name" id="listName">Loading...</span>
         <span class="status-dot" id="statusDot" style="display:none; font-size: 30px;">&#9679;</span>
          <span class="limit-count" id="limitCountText" style="display:none;"></span>
        </div>
        <div class="status-text" id="statusText" style="color: #22c55e;">Within limit</div>
      </div>
    </div>

  <div class="stats" id="statsBox" style="display:none;">
    <div class="stats-row">
      <span>Cards in list</span>
      <span class="stats-count" id="statsCount">0</span>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill" style="width:0%; background:#22c55e;"></div>
    </div>
  </div>

  <div class="control-label">Maximum cards</div>
  <div class="number-control">
    <button id="decBtn">-</button>
    <input type="number" id="limitInput" value="0" min="0" />
    <button id="incBtn">+</button>
  </div>

  <p class="hint">
    The list name turns yellow at the limit, and red once it's exceeded. Set to 0 to remove the limit suffix.
  </p>

  <button class="save-btn" id="saveBtn">Save</button>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var TRELLO_API_KEY = '1bde546d7e6e1918bea4131b50dd462d';
    var APP_NAME = 'List Limit Power-Up';
    var t = window.TrelloPowerUp.iframe({
      appKey: TRELLO_API_KEY,
      appName: APP_NAME
    });
    var limitVal = 0;
    var cardCount = 0;
    var listId = null;
    var listName = '';

    function getColor(count, limit) {
      if (limit > 0 && count > limit) return '#ef4444';
      if (limit > 0 && count === limit) return '#eab308';
      return '#22c55e';
    }

    function getStatusEmoji(count, limit) {
      if (!limit || limit <= 0) return '';
      if (count > limit) return '\uD83D\uDD34';
      if (count === limit) return '\uD83D\uDFE1';
      return '\uD83D\uDFE2';
    }

    function stripLimitSuffix(name) {
      return String(name || '').replace(/\s*(?:\uD83D\uDFE2|\uD83D\uDFE1|\uD83D\uDD34)\s*\(\d+\s*\/\s*\d+\)\s*$/u, '').trim();
    }

    function buildLimitedListName(name, count, limit) {
      var baseName = stripLimitSuffix(name);
      var emoji = getStatusEmoji(count, limit);
      if (!emoji) return baseName;
      return baseName + ' ' + emoji + ' (' + count + '/' + limit + ')';
    }

    function renameListWithToken(name, token) {
      var url = 'https://api.trello.com/1/lists/' + encodeURIComponent(listId) +
        '?name=' + encodeURIComponent(name) +
        '&key=' + encodeURIComponent(TRELLO_API_KEY) +
        '&token=' + encodeURIComponent(token);

      console.log('Renaming Trello list:', listId, name);

      return fetch(url, {
        method: 'PUT',
        headers: { 'Accept': 'application/json' }
      }).then(function (response) {
        if (!response.ok) {
          return response.text().then(function (body) {
            throw new Error('Trello rename failed: ' + response.status + ' ' + body);
          });
        }
        return response.json();
      }).then(function (renamedList) {
        console.log('Trello list renamed:', renamedList && renamedList.name);
        return renamedList;
      });
    }

    function getRestToken(shouldAuthorize) {
      return Promise.resolve(t.getRestApi())
        .then(function (client) {
          return Promise.resolve(client.getToken())
            .then(function (token) {
              if (token || !shouldAuthorize) return token;
              return Promise.resolve(client.authorize({ scope: 'read,write', expiration: 'never' }))
                .then(function (authorizedToken) {
                  if (authorizedToken) return authorizedToken;
                  return Promise.resolve(client.getToken());
                });
            });
        });
    }

    function authorizeAndRenameList(nextName, token) {
      if (!listId || !nextName || nextName === listName) {
        console.log('Skipping Trello list rename:', {
          listId: listId,
          currentName: listName,
          nextName: nextName,
          cardCount: cardCount,
          limit: limitVal
        });
        return Promise.resolve(null);
      }

      if (!token) throw new Error('Missing Trello REST token. Authorize the Power-Up first.');

      console.log('Prepared Trello list rename:', {
        listId: listId,
        currentName: listName,
        nextName: nextName,
        cardCount: cardCount,
        limit: limitVal
      });

      return renameListWithToken(nextName, token)
        .then(function () {
          listName = nextName;
        });
    }

    function saveLimit() {
      if (limitVal > 0) {
        return t.set('board', 'shared', 'limit_' + listId, limitVal)
          .then(function () {
            return t.set('list', 'shared', 'limit', limitVal);
          });
      }

      return t.remove('board', 'shared', 'limit_' + listId)
        .then(function () {
          return t.remove('list', 'shared', 'limit');
        });
    }
    function sizeToContent() {
      t.sizeTo('#container').catch(function () {});
    }

    function updateUI() {
      var pct = limitVal > 0 ? Math.min(100, (cardCount / limitVal) * 100) : 0;
      var color = getColor(cardCount, limitVal);

      document.getElementById('limitInput').value = limitVal;

      if (limitVal > 0) {
        document.getElementById('statsBox').style.display = 'block';
        document.getElementById('statsCount').textContent = cardCount + ' / ' + limitVal;
        document.getElementById('progressFill').style.width  = pct + '%';
        document.getElementById('progressFill').style.background = color;
        document.getElementById('statusText').style.color = color;
        document.getElementById('iconBox').style.background = color + '22';
        document.getElementById('iconBox').querySelector('svg').setAttribute('stroke', color);
        document.getElementById('statusDot').style.display = 'inline-block';
        document.getElementById('statusDot').style.color = color;
        document.getElementById('limitCountText').style.display = 'inline-block';
        document.getElementById('limitCountText').textContent = '(' + cardCount + '/' + limitVal + ')';

        if (cardCount > limitVal) {
          document.getElementById('statusText').textContent = 'Limit exceeded';
        } else if (cardCount === limitVal) {
          document.getElementById('statusText').textContent = 'At limit';
        } else {
          document.getElementById('statusText').textContent = 'Within limit';
        }
      } else {
        document.getElementById('statsBox').style.display = 'none';
        document.getElementById('statusText').textContent  = 'No limit set';
        document.getElementById('statusText').style.color  = '#8C9BAB';
        document.getElementById('statusDot').style.display = 'none';
        document.getElementById('limitCountText').style.display = 'none';
      }

      sizeToContent();
    }

    t.render(function () {
      t.list('id', 'name', 'cards').then(function (list) {
        listId = list.id;
        listName = list.name;
        cardCount = list.cards ? list.cards.length : 0;
        document.getElementById('listName').textContent = stripLimitSuffix(list.name);

        return t.get('board', 'shared', 'limit_' + list.id).then(function (saved) {
          limitVal = saved ? parseInt(saved, 10) : 0;
          updateUI();
        });
      });
    });

    document.getElementById('incBtn').addEventListener('click', function () {
      limitVal++;
      updateUI();
    });

    document.getElementById('decBtn').addEventListener('click', function () {
      if (limitVal > 0) limitVal--;
      updateUI();
    });

    document.getElementById('limitInput').addEventListener('change', function () {
      limitVal = Math.max(0, parseInt(this.value, 10) || 0);
      updateUI();
    });

    document.getElementById('saveBtn').addEventListener('click', function () {
      console.log('Saving:', limitVal);

      var nextName = null;
      var token = null;

      t.list('id', 'name', 'cards')
        .then(function (list) {
          listId = list.id;
          listName = list.name;
          cardCount = list.cards ? list.cards.length : 0;
          nextName = buildLimitedListName(listName, cardCount, limitVal);

          console.log('Save target list:', {
            listId: listId,
            currentName: listName,
            nextName: nextName,
            cardCount: cardCount,
            limit: limitVal
          });

          return getRestToken(true);
        })
        .then(function (restToken) {
          token = restToken;
          return saveLimit();
        })
        .then(function () {
          console.log('Saved successfully');
          return authorizeAndRenameList(nextName, token);
        })
        .then(function () {
          t.closePopup();
        })
        .catch(function (err) {
          console.error('Save failed:', err);
          t.alert({
            message: 'Failed to save limit or rename list',
            duration: 5
          });
        });
    });
  </script>
  </div>
</body>
</html>
