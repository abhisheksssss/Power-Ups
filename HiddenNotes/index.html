<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hidden Notes Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    var BASE_URL = window.location.origin + window.location.pathname.replace('index.html', '');

    TrelloPowerUp.initialize({

      // Adds a section to the back of every card
      'card-back-section': function(t, options) {
        // Check creator + permissions to determine access
        return Promise.all([
          t.get('card', 'shared', 'noteCreator'),
          t.get('card', 'shared', 'notePermissions'),
          t.member('id')
        ]).then(function(results) {
          var creator = results[0];
          var perms = results[1] || [];
          var memberId = results[2].id;

          // If no creator is set, allow access so someone can create the first note
          // If creator is set, allow access only for the creator or explicitly permitted members
          var hasAccess = !creator || memberId === creator || perms.includes(memberId);

          if (!hasAccess) {
            return {
              title: 'Hidden Notes',
              icon: BASE_URL + 'icon.svg',
              content: {
                type: 'iframe',
                url: t.signUrl(BASE_URL + 'no-access.html'),
                height: 60
              }
            };
          }

          return {
            title: 'Hidden Notes',
            icon: BASE_URL + 'icon.svg',
            content: {
              type: 'iframe',
              url: t.signUrl(BASE_URL + 'card-back.html'),
              height: 320
            }
          };
        });
      }

    });
  </script>
</body>
</html>
