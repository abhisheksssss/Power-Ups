<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hidden Notes</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <!-- TinyMCE CDN - No API key needed for self-hosted usage -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    ::-webkit-scrollbar {
    display: none;
}

html {
    scrollbar-width: none;
}

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 8px;
       -ms-overflow-style: none;

    }

    #editor-wrapper {
      border-radius: 6px;
      overflow: hidden;
      background: transparent;
     
    }

    /* TinyMCE container styling */
    .tox-tinymce {
      border: none !important;
      border-radius: 0 !important;
    }

    #bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-top: 1px solid #e0e0e0;
      background: transparent;
      justify-content: flex-end;
    }

    #change-permission-btn {
      background: #FEF9B4;
      color: #333;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    #change-permission-btn:hover {
      background: #e6b030;
    }

    #save-btn {
      background: #D2D1FF;
      color: #312E7C;
      border: none;
      border-radius: 4px;
      padding: 7px 22px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #save-btn:hover {
      background: #4f86f7;
    }

    #save-btn.saved {
      background: #61bd4f;
    }

    #status-msg {
      font-size: 12px;
      color: #61bd4f;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #status-msg.show {
      opacity: 1;
    }

    #loading {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="loading">Loading editor...</div>

  <div id="editor-wrapper" style="display:none;">
    <div style="display: flex; justify-content: flex-end; padding: 8px 8px 8px 0;">
      <button id="change-permission-btn" onclick="openPermissions()">
        Change Permission
      </button>
    </div>
    <textarea id="note-editor"></textarea>

    <div id="bottom-bar">
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="status-msg">✓ Saved!</span>
        <button id="save-btn" onclick="saveNote()">Save</button>
      </div>
    </div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var editorReady = false;

    // Initialize TinyMCE
    tinymce.init({
      selector: '#note-editor',
      height: 260,
      menubar: 'file edit insert format table help',
    plugins: [
    'image',
    'link',
    'table',
    'codesample',
    'emoticons',
    'help'
],
     toolbar:
'undo redo | bold italic | forecolor backcolor | align | image emoticons',
      toolbar_mode: 'wrap',
      skin: 'oxide',
      content_css: 'default',
      branding: false,
      promotion: false,
      statusbar: false,
      resize: false,
      setup: function(editor) {
        editor.on('init', function() {
          editorReady = true;

          // Load saved note content
          t.get('card', 'shared', 'hiddenNote').then(function(note) {
            editor.setContent(note || '');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('editor-wrapper').style.display = 'block';

            // Resize the Trello iframe to fit content
            t.sizeTo('#editor-wrapper').catch(function() {});
          });
        });
      }
    });

    // Save the note back to Trello card data
    function saveNote() {
      if (!editorReady) return;

      var content = tinymce.get('note-editor').getContent();
      var saveBtn = document.getElementById('save-btn');
      var statusMsg = document.getElementById('status-msg');

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      t.set('card', 'shared', 'hiddenNote', content).then(function() {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
        saveBtn.classList.add('saved');
        statusMsg.classList.add('show');

        setTimeout(function() {
          saveBtn.classList.remove('saved');
          statusMsg.classList.remove('show');
        }, 2000);
      }).catch(function(err) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
        alert('Error saving note. Please try again.');
        console.error(err);
      });
    }

    // Open the Change Permission popup
    function openPermissions() {
      t.popup({
        title: 'Change Permission',
        url: './permission.html',
        height: 350
      });
    }
  </script>
</body>
</html>
