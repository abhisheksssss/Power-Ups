<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script src="https://cdn.tiny.cloud/1/YOUR_TINYMCE_KEY/tinymce/6/tinymce.min.js"></script>

<div id="editor-container">
  <textarea id="note-editor"></textarea>
  <button onclick="saveNote()">Save</button>
  <button onclick="changePermission()">Change Permission</button>
</div>

<script>
var t = TrelloPowerUp.iframe();

// Load existing note
t.get('card', 'shared', 'hiddenNote').then(function(note) {
  tinymce.init({
    selector: '#note-editor',
    setup: function(editor) {
      editor.on('init', function() {
        editor.setContent(note || '');
      });
    }
  });
});

function saveNote() {
  var content = tinymce.get('note-editor').getContent();
  t.set('card', 'shared', 'hiddenNote', content);
}

function changePermission() {
  t.popup({
    title: 'Change Permission',
    url: './permission.html',
    height: 300
  });
}
</script>
