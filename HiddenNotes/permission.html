<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Permission</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      padding: 16px;
    }

    /* Search bar */
    #search-container {
      background: #e8f5e9;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }

    #search-container::before {
      content: '';
      width: 2px;
      height: 18px;
      background: #333;
      margin-right: 10px;
      flex-shrink: 0;
    }

    #search-input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 14px;
      color: #333;
    }

    #search-input::placeholder {
      color: #8bc78b;
      font-weight: 500;
    }

    /* Section title */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }

    /* Member list */
    #member-list {
      list-style: none;
      margin-bottom: 18px;
    }

    #member-list li {
      display: flex;
      align-items: center;
      padding: 10px 4px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 6px;
    }

    #member-list li:hover {
      background: #f5f5f5;
    }

    /* Custom checkbox — rounded square */
    .member-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #ccc;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: #e0e0e0;
    }

    .member-checkbox.checked {
      background: #4caf50;
      border-color: #4caf50;
    }

    .member-checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .member-name {
      font-size: 14px;
      color: #333;
      font-weight: 500;
      flex: 1;
    }

    /* No members message */
    .no-members {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 20px 0;
    }

    /* Save button — right aligned */
    #save-bar {
      display: flex;
      justify-content: flex-end;
    }

    #save-btn {
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    #save-btn:hover {
      background: #43a047;
    }

    #save-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* Loading */
    #loading {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 30px 0;
    }

    #content {
      display: none;
    }
  </style>
</head>
<body>

  <div id="loading">Loading members...</div>

  <div id="content">
    <!-- Search box -->
    <div id="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search Members"
        oninput="filterMembers()"
      />
    </div>

    <!-- Member list -->
    <p class="section-title">Board Members</p>
    <ul id="member-list"></ul>

    <!-- Save button -->
    <div id="save-bar">
      <button id="save-btn" onclick="savePermissions()">SAVE</button>
    </div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var allMembers = [];      // All board members
    var selectedIds = [];     // Currently selected (allowed) member IDs

    // Load board members, existing permissions, and the note creator
    Promise.all([
      t.board('members'),
      t.get('card', 'shared', 'notePermissions'),
      t.get('card', 'shared', 'noteCreator')
    ]).then(function(results) {
      var board = results[0];
      var perms = results[1];
      var creator = results[2];

      var members = board.members || [];
      // Filter out the creator so they don't show up in the permission list
      allMembers = members.filter(function(m) { return m.id !== creator; });
      
      selectedIds = perms || [];

      renderMembers(allMembers);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      t.sizeTo('body').catch(function() {});
    }).catch(function(err) {
      document.getElementById('loading').textContent = 'Error loading members.';
      console.error(err);
    });

    // Render member list
    function renderMembers(members) {
      var list = document.getElementById('member-list');
      list.innerHTML = '';

      if (members.length === 0) {
        list.innerHTML = '<li class="no-members">No members found.</li>';
        return;
      }

      members.forEach(function(member) {
        var isChecked = selectedIds.includes(member.id);

        var li = document.createElement('li');
        li.setAttribute('data-id', member.id);
        li.setAttribute('data-name', (member.fullName || member.username || '').toLowerCase());
        li.onclick = function() { toggleMember(member.id, li); };

        // Checkbox
        var checkbox = document.createElement('div');
        checkbox.className = 'member-checkbox' + (isChecked ? ' checked' : '');
        checkbox.id = 'chk-' + member.id;

        // Name
        var nameEl = document.createElement('span');
        nameEl.className = 'member-name';
        nameEl.textContent = member.fullName || member.username || 'Unknown';

        li.appendChild(checkbox);
        li.appendChild(nameEl);
        list.appendChild(li);
      });
    }

    // Toggle a member's selected state
    function toggleMember(memberId, li) {
      var idx = selectedIds.indexOf(memberId);
      var checkbox = document.getElementById('chk-' + memberId);

      if (idx === -1) {
        selectedIds.push(memberId);
        if (checkbox) checkbox.classList.add('checked');
      } else {
        selectedIds.splice(idx, 1);
        if (checkbox) checkbox.classList.remove('checked');
      }
    }

    // Filter visible members by search text
    function filterMembers() {
      var query = document.getElementById('search-input').value.toLowerCase();
      var items = document.querySelectorAll('#member-list li[data-name]');

      items.forEach(function(item) {
        var name = item.getAttribute('data-name') || '';
        item.style.display = name.includes(query) ? '' : 'none';
      });
    }

    // Save permissions and close popup
    function savePermissions() {
      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      t.set('card', 'shared', 'notePermissions', selectedIds).then(function() {
        t.closePopup();
      }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'SAVE';
        alert('Error saving permissions. Try again.');
        console.error(err);
      });
    }
  </script>
</body>
</html>
