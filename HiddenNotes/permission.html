<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Permission</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      padding: 12px;
    }

    /* Search bar */
    #search-container {
      background: #e8f5e9;
      border: 2px solid #81c784;
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    #search-input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 13px;
      color: #333;
    }

    #search-input::placeholder {
      color: #999;
    }

    /* Section title */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    /* Member list */
    #member-list {
      list-style: none;
      margin-bottom: 16px;
    }

    #member-list li {
      display: flex;
      align-items: center;
      padding: 8px 4px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
    }

    #member-list li:hover {
      background: #f5f5f5;
    }

    /* Custom checkbox */
    .member-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ccc;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: #fff;
    }

    .member-checkbox.checked {
      background: #61bd4f;
      border-color: #61bd4f;
    }

    .member-checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    /* Avatar */
    .member-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      margin-right: 10px;
      object-fit: cover;
      background: #4f86f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .member-name {
      font-size: 13px;
      color: #333;
      flex: 1;
    }

    /* No members message */
    .no-members {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 20px 0;
    }

    /* All-access note */
    #all-access-note {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: #fff9e6;
      border-left: 3px solid #f6c042;
      border-radius: 2px;
    }

    /* Save button */
    #save-btn {
      width: 100%;
      background: #61bd4f;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    #save-btn:hover {
      background: #52a944;
    }

    #save-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* Loading */
    #loading {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 30px 0;
    }

    #content {
      display: none;
    }
  </style>
</head>
<body>

  <div id="loading">Loading members...</div>

  <div id="content">
    <!-- Search box -->
    <div id="search-container">
      <span style="margin-right:6px; color:#999;">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="Search Members"
        oninput="filterMembers()"
      />
    </div>

    <!-- Info note -->
    <div id="all-access-note">
      If no members are selected, <strong>all board members</strong> can see the notes.
    </div>

    <!-- Member list -->
    <p class="section-title">Board Members</p>
    <ul id="member-list"></ul>

    <!-- Save button -->
    <button id="save-btn" onclick="savePermissions()">SAVE</button>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var allMembers = [];      // All board members
    var selectedIds = [];     // Currently selected (allowed) member IDs

    // Load board members + existing permissions
    Promise.all([
      t.board('members'),
      t.get('card', 'shared', 'notePermissions')
    ]).then(function(results) {
      var board = results[0];
      var perms = results[1];

      allMembers = board.members || [];
      selectedIds = perms || [];

      renderMembers(allMembers);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      t.sizeTo('body').catch(function() {});
    }).catch(function(err) {
      document.getElementById('loading').textContent = 'Error loading members.';
      console.error(err);
    });

    // Render member list
    function renderMembers(members) {
      var list = document.getElementById('member-list');
      list.innerHTML = '';

      if (members.length === 0) {
        list.innerHTML = '<li class="no-members">No members found.</li>';
        return;
      }

      members.forEach(function(member) {
        var isChecked = selectedIds.includes(member.id);

        var li = document.createElement('li');
        li.setAttribute('data-id', member.id);
        li.setAttribute('data-name', (member.fullName || member.username || '').toLowerCase());
        li.onclick = function() { toggleMember(member.id, li); };

        // Checkbox circle
        var checkbox = document.createElement('div');
        checkbox.className = 'member-checkbox' + (isChecked ? ' checked' : '');
        checkbox.id = 'chk-' + member.id;

        // Avatar
        var avatar = document.createElement('div');
        avatar.className = 'member-avatar';

        if (member.avatarUrl) {
          var img = document.createElement('img');
          img.src = member.avatarUrl + '/30.png';
          img.alt = member.fullName || member.username;
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.borderRadius = '50%';
          img.onerror = function() {
            avatar.textContent = getInitials(member.fullName || member.username || '?');
          };
          avatar.appendChild(img);
        } else {
          avatar.textContent = getInitials(member.fullName || member.username || '?');
        }

        // Name
        var nameEl = document.createElement('span');
        nameEl.className = 'member-name';
        nameEl.textContent = member.fullName || member.username || 'Unknown';

        li.appendChild(checkbox);
        li.appendChild(avatar);
        li.appendChild(nameEl);
        list.appendChild(li);
      });
    }

    // Toggle a member's selected state
    function toggleMember(memberId, li) {
      var idx = selectedIds.indexOf(memberId);
      var checkbox = document.getElementById('chk-' + memberId);

      if (idx === -1) {
        selectedIds.push(memberId);
        if (checkbox) checkbox.classList.add('checked');
      } else {
        selectedIds.splice(idx, 1);
        if (checkbox) checkbox.classList.remove('checked');
      }
    }

    // Filter visible members by search text
    function filterMembers() {
      var query = document.getElementById('search-input').value.toLowerCase();
      var items = document.querySelectorAll('#member-list li[data-name]');

      items.forEach(function(item) {
        var name = item.getAttribute('data-name') || '';
        item.style.display = name.includes(query) ? '' : 'none';
      });
    }

    // Save permissions and close popup
    function savePermissions() {
      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      t.set('card', 'shared', 'notePermissions', selectedIds).then(function() {
        t.closePopup();
      }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'SAVE';
        alert('Error saving permissions. Try again.');
        console.error(err);
      });
    }

    // Helper: get initials from a name
    function getInitials(name) {
      var parts = name.trim().split(' ');
      if (parts.length >= 2) {
        return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      }
      return name.substring(0, 2).toUpperCase();
    }
  </script>
</body>
</html>
